<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <meta name="description" content="Modern portfolio template powered by content.md">
  <meta name="theme-color" content="#2563eb">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand">
        <span class="brand-label">Portfolio</span>
        <a id="brand-name" class="brand-name" href="#">Your Name</a>
      </div>

      <nav class="primary-nav" aria-label="Primary navigation"></nav>

      <div class="header-actions">
        <button id="theme-toggle" class="button button-secondary" type="button" aria-label="Toggle theme">🌙 Dark</button>
      </div>
    </header>

    <main id="main-content" class="main-content">
      <div class="loader">Loading portfolio content…</div>
    </main>

    <footer class="footer" id="footer"></footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
